{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:560px; margin: 2rem auto;">
  <h2 style="margin-top:0;">Create account</h2>

  {% if form.errors %}
    <div class="card" style="border-color:#ef4444;">
      <strong style="color:#fecaca;">Please fix the errors below.</strong>
      <div style="color:#fecaca; margin-top:.5rem;">
        {{ form.errors }}
      </div>
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div class="row">
      <div style="margin-bottom:1rem;">
        <label for="id_username">Username</label>
        <input id="id_username" name="username" type="text" required>
      </div>
      <div style="margin-bottom:1rem;">
        <label for="id_email">Email (optional)</label>
        <input id="id_email" name="email" type="email">
      </div>
    </div>

    <div class="row">
      <div style="margin-bottom:1rem;">
        <label for="id_password1">Password</label>
        <input id="id_password1" name="password1" type="password" required>
      </div>
      <div style="margin-bottom:1rem;">
        <label for="id_password2">Confirm password</label>
        <input id="id_password2" name="password2" type="password" required>
      </div>
    </div>

    <div class="row" style="align-items:center;">
      <div>
        <button type="submit">Register</button>
      </div>
      <div style="text-align:right;">
        <a href="{% url 'login' %}">Already have an account?</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
